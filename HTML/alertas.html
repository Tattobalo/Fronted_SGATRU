<header class="topbar">
  <div>
    <h1>Alertas de Red</h1>
    <p>Monitoreo de fallas, desconexiones, intermitencias y riesgos detectados</p>
  </div>
  <button class="scan-btn" id="btn-ejecutar-escaneo">Ejecutar escaneo</button>
</header>

<section class="alerts-summary">
  <div class="summary-card">
    <h3>Críticas</h3>
    <p class="red" id="alertas-criticas">-</p>
  </div>
  <div class="summary-card">
    <h3>Advertencias</h3>
    <p class="gold" id="alertas-advertencias">-</p>
  </div>
  <div class="summary-card">
    <h3>Resueltas</h3>
    <p class="green" id="alertas-resueltas">-</p>
  </div>
  <div class="summary-card">
    <h3>Total Histórico</h3>
    <p id="alertas-totales">-</p>
  </div>
</section>

<section class="filters">
  <input type="text" id="buscar-alerta" placeholder="Buscar por equipo, IP o tipo de incidente...">
  <select id="filtro-severidad">
    <option value="Todas las severidades">Todas las severidades</option>
    <option value="Critica">Crítica</option>
    <option value="Advertencia">Advertencia</option>
  </select>

  <select id="filtro-estado-alerta">
    <option value="activas">Solo activas</option>
    <option value="todas">Todas (Incluir resueltas)</option>
    <option value="resueltas">Resueltas</option>
  </select>
  <button id="btn-filtrar-alertas">Filtrar</button>
</section>

<section class="alerts-grid" id="contenedor-tarjetas-alertas">
  <p>Escaneando y recuperando estado de incidencias...</p>
</section>
