<header class="topbar">
  <div>
    <h1>Inventario de Activos</h1>
    <p>Registro general de equipos, red, responsables y ubicación física</p>
  </div>
  <a href="#/nuevoActivo" data-link class="add-btn">
    + Nuevo activo
  </a>
</header>

<section class="inventory-summary">
  <div class="summary-card">
    <h3>Total activos</h3>
    <p id="total-activos">-</p>
  </div>
  <div class="summary-card">
    <h3>Online</h3>
    <p class="green" id="total-online">-</p>
  </div>
  <div class="summary-card">
    <h3>Offline</h3>
    <p class="red" id="total-offline">-</p>
  </div>
  <div class="summary-card">
    <h3>Intermitentes</h3>
    <p class="gold" id="total-intermitentes">-</p>
  </div>
</section>

<section class="filters">
  <input type="text" id="buscar-activo" placeholder="Buscar por equipo, IP, MAC o responsable...">
  <select id="filtro-estado-activo">
    <option value="">Todos los estados</option>
    <option value="Online">Online</option>
    <option value="Offline">Offline</option>
    <option value="Intermitente">Intermitente</option>
  </select>
  <select id="filtro-edificio-activo">
    <option value="">Todos los edificios</option>
  </select>
  <button id="btn-filtrar-activo">Filtrar</button>
</section>

<section class="table-section">
  <div class="table-header">
    <h2>Listado de Activos</h2>
    <button class="export-btn" id="btn-exportar">Exportar</button>
  </div>

  <table id="tabla-inventario">
    <thead>
      <tr>
        <th>Equipo (Hostname)</th>
        <th>Dirección IP</th>
        <th>Dirección MAC</th>
        <th>Ubicación Asignada</th>
        <th>Responsable</th>
        <th>Estado</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
</section>
