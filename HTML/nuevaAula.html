<section class="form-page">
  <div class="form-header">
    <div>
      <h1>Registrar Aula / Espacio Académico</h1>
      <p>Alta de aulas, laboratorios, oficinas o cubículos</p>
      <link rel="stylesheet" href="compartido.css">
    </div>

    <button class="btn-volver" onclick="navegar('/nivel')">← Volver</button>
  </div>

  <form class="form-card">
    <h2>Datos del espacio</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Nombre del espacio</label>
        <input type="text" placeholder="Ej. Laboratorio 1" required>
      </div>

      <div class="form-group">
        <label>Tipo de espacio</label>
        <select required>
          <option value="">Selecciona una opción</option>
          <option>Aula</option>
          <option>Laboratorio</option>
          <option>Oficina</option>
          <option>Cubículo</option>
          <option>Cuarto de red</option>
        </select>
      </div>

      <div class="form-group">
        <label>Edificio</label>
        <select required>
          <option>Edificio A</option>
          <option>Edificio B</option>
          <option>Biblioteca</option>
        </select>
      </div>

      <div class="form-group">
        <label>Piso / Nivel</label>
        <select required>
          <option>Piso 1</option>
          <option>Piso 2</option>
          <option>Piso 3</option>
        </select>
      </div>

      <div class="form-group">
        <label>Capacidad</label>
        <input type="number" placeholder="Ej. 30">
      </div>

      <div class="form-group">
        <label>Responsable</label>
        <input type="text" placeholder="Ej. Ing. Juan Pérez">
      </div>
    </div>

    <div class="form-group full">
      <label>Observaciones</label>
      <textarea placeholder="Detalles del espacio académico"></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancelar" onclick="navegar('/nivel')">Cancelar</button>
      <button type="submit" class="btn-guardar">Guardar espacio</button>
    </div>
  </form>
</section>
