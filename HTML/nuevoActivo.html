<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuevo Activo - SGATRU</title>
<link rel="stylesheet" href="../CSS/nuevoActivo.css">
<script type="module" src="../JS/nuevoActivo.js"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Registrar Nuevo Activo</h1>
        <p>Alta de equipos dentro de la infraestructura universitaria</p>
    </div>

    <form id="form-nuevo-activo">

        <div class="section">
            <h2>Información General</h2>
            <div class="grid">
                <div class="campo">
                    <label for="tipo_activo">Tipo de Activo</label>
                    <select id="tipo_activo" required>
                        <option value="">Selecciona una opción</option>
                        <option value="Computadora">Computadora / Nodo Fin</option>
                        <option value="Switch">Switch (Equipo de Red)</option>
                        <option value="Access Point">Access Point</option>
                        <option value="Servidor">Servidor</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="hostname">Hostname / Nombre del Equipo</label>
                    <input type="text" id="hostname" placeholder="Ej. PC-LAB01-01" required>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Datos de Red</h2>
            <div class="grid">
                <div class="campo" id="grupo-mac">
                    <label for="mac_address">MAC Address (Identificador Físico)</label>
                    <input type="text" id="mac_address" placeholder="AA:BB:CC:DD:EE:FF">
                </div>
                
                <div class="campo" id="grupo-datos-switch" style="display: none;">
                    <label for="ip_gestion">IP de Gestión (Switch)</label>
                    <input type="text" id="ip_gestion" placeholder="Ej. 10.10.1.2">
                </div>

                <div class="campo" id="grupo-datos-pc">
                    <label for="ip_estatica">Dirección IP Estática (Opcional)</label>
                    <input type="text" id="ip_estatica" placeholder="Ej. 192.168.1.10">
                </div>

                <div class="campo" id="grupo-switch-uplink">
                    <label for="id_switch">Switch de Conexión (Uplink)</label>
                    <select id="id_switch">
                        <option value="">Selecciona el switch donde se conecta</option>
                    </select>
                </div>

                <div class="campo" id="grupo-puerto-uplink">
                    <label for="puerto_etiqueta">Puerto Físico en el Switch</label>
                    <input type="text" id="puerto_etiqueta" placeholder="Ej. Gi0/1">
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Ubicación Física y Asignación</h2>
            <div class="grid">
                
                <div class="campo">
                    <label for="id_espacio">Aula / Laboratorio Destino</label>
                    <select id="id_espacio" required>
                        <option value="">Selecciona el aula destino</option>
                    </select>
                </div>
                
                <div class="campo" id="grupo-responsable">
                    <label for="id_responsable">Responsable Asignado</label>
                    <select id="id_responsable">
                        <option value="">Selecciona un usuario responsable</option>
                    </select>
                </div>

            </div>
        </div>

        <div class="acciones">
            <button type="button" class="cancelar" onclick="window.location.href='#/inventario'" data-link>Cancelar</button>
            <button type="submit" class="guardar">Guardar Activo</button>
        </div>

    </form>
</div>

</body>
</html>
