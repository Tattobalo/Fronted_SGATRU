<section class="form-page">
  <div class="form-header">
    <div>
      <h1>Registrar Edificio</h1>
      <p>Alta de edificios dentro del campus universitario</p>
      <link rel="stylesheet" href="compartido.css">
    </div>

    <button class="btn-volver" onclick="navegar('/campus')">← Volver</button>
  </div>

  <form class="form-card">
    <h2>Datos del edificio</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Nombre del edificio</label>
        <input type="text" placeholder="Ej. Edificio A" required>
      </div>

      <div class="form-group">
        <label>Clave del edificio</label>
        <input type="text" placeholder="Ej. EDA" required>
      </div>

      <div class="form-group">
        <label>Número de pisos</label>
        <input type="number" placeholder="Ej. 3" required>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select>
          <option>Operativo</option>
          <option>Con alertas</option>
          <option>En mantenimiento</option>
        </select>
      </div>
    </div>

    <div class="form-group full">
      <label>Descripción</label>
      <textarea placeholder="Descripción general del edificio"></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancelar" onclick="navegar('/campus')">Cancelar</button>
      <button type="submit" class="btn-guardar">Guardar edificio</button>
    </div>
  </form>
</section>
