<header class="topbar">
  <div>
    <h1>Nuevo Usuario</h1>
    <p>Registro de cuenta, rol y permisos de acceso al sistema SGATRU</p>
  </div>

  <a href="#/usuarios" data-link class="back-btn">← Volver</a>
</header>

<section class="form-section">

  <!-- Se añade el ID 'form-nuevo-usuario' para interceptar el evento submit con JavaScript -->
  <form class="user-form" id="form-nuevo-usuario">

    <h2>Datos personales</h2>

    <div class="form-grid">
      <div class="form-group">
        <label for="nombre_completo">Nombre completo</label>
        <input type="text" id="nombre_completo" placeholder="Ej. Karen Minigo" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo institucional</label>
        <input type="email" id="correo" placeholder="usuario@uaemex.mx" required>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="722 000 0000">
      </div>

      <div class="form-group">
        <label for="cargo">Cargo</label>
        <input type="text" id="cargo" placeholder="Ej. Responsable de laboratorio">
      </div>
    </div>

    <h2>Datos de acceso</h2>

    <div class="form-grid">
      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input type="text" id="username" placeholder="Ej. kminigo" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña temporal</label>
        <input type="password" id="password" placeholder="Contraseña temporal" required>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirmar contraseña</label>
        <input type="password" id="confirm_password" placeholder="Confirmar contraseña" required>
      </div>

      <div class="form-group">
        <label for="estado">Estado</label>
        <select id="estado">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
    </div>

    <h2>Rol y área asignada</h2>

    <div class="form-grid">
      <div class="form-group">
        <label for="rol">Rol del usuario</label>
        <select id="rol" required>
          <option value="">Selecciona un rol</option>
          <option value="Administrador de Red">Administrador de Red</option>
          <option value="Responsable de Área">Responsable de Área</option>
          <option value="Auxiliar de Inventario">Auxiliar de Inventario</option>
          <option value="Usuario de Consulta">Usuario de Consulta</option>
        </select>
      </div>

      <div class="form-group">
        <label for="edificio_asignado">Edificio asignado</label>
        <select id="edificio_asignado" required>
          <option value="">Selecciona un edificio</option>
          <option value="Campus completo">Campus completo</option>
        </select>
      </div>

      <div class="form-group">
        <label for="piso_asignado">Piso asignado</label>
        <select id="piso_asignado" required disabled>
          <option value="">Selecciona un piso</option>
        </select>
      </div>

      <div class="form-group">
        <label for="aula_asignada">Aula/Laboratorio</label>
        <select id="aula_asignada" required disabled>
          <option value="">Selecciona un espacio</option>
        </select>
      </div>
    </div>

    <h2>Permisos</h2>

    <div class="permissions-grid">

      <label class="permission-card">
        <input type="checkbox" id="permiso_dashboard" value="ver_dashboard" checked>
        <span>Ver dashboard</span>
      </label>

      <label class="permission-card">
        <input type="checkbox" id="permiso_inventario" value="consultar_inventario" checked>
        <span>Consultar inventario</span>
      </label>

      <label class="permission-card">
        <input type="checkbox" id="permiso_editar" value="editar_activos">
        <span>Editar activos</span>
      </label>

      <label class="permission-card">
        <input type="checkbox" id="permiso_usuarios" value="gestionar_usuarios">
        <span>Gestionar usuarios</span>
      </label>

      <label class="permission-card">
        <input type="checkbox" id="permiso_escaneos" value="ejecutar_escaneos">
        <span>Ejecutar escaneos</span>
      </label>

      <label class="permission-card">
        <input type="checkbox" id="permiso_reportes" value="generar_reportes" checked>
        <span>Generar reportes</span>
      </label>

    </div>

    <div class="form-actions">
      <a href="#/usuarios" data-link class="cancel-btn">Cancelar</a>
      <button type="submit" class="save-btn">Guardar usuario</button>
    </div>

  </form>

</section>
