<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - SGATRU</title>
  <link rel="stylesheet" href="../CSS/recuperarContra.css">
</head>
<body>

  <div class="recover-container">
    <div class="recover-card">

      <div class="header-login">
        <img src="../logo_uaemex.png" alt="Logo UAEMex" class="logo">

        <div class="titulo-login">
          <h1>SGATRU</h1>
          <h2>Recuperación de contraseña</h2>
        </div>
      </div>

      <p class="info-text">
        Ingresa tu correo institucional para recibir instrucciones de recuperación.
      </p>

      <form>
        <label>Correo institucional</label>
        <input type="email" placeholder="usuario@uaemex.mx" required>

        <button type="submit">Enviar instrucciones</button>

        <a href="login.html">← Volver al inicio de sesión</a>
      </form>

    </div>
  </div>

</body>
</html>
